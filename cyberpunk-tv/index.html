<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #000;
      font-family: 'Share Tech Mono', monospace;
    }

    .composition {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
    }

    /* ── Room Background (dark cyberpunk hangout) ── */
    .room-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(20, 5, 40, 0.9) 0%, rgba(5, 2, 15, 1) 70%),
        linear-gradient(180deg, #0a0015 0%, #050010 50%, #020008 100%);
    }

    .neon-ambient {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(0, 255, 255, 0.05) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 0, 128, 0.04) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 100%, rgba(120, 0, 255, 0.06) 0%, transparent 30%);
    }

    /* ── TV Frame Image ── */
    .tv-frame {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: url('assets/cyberpunk-tv-frame.png') center/cover no-repeat;
    }

    /* ── Screen Area (green screen + warm sunshine overlay) ── */
    .greenscreen {
      position: absolute;
      top: 12%;
      left: 18%;
      width: 64%;
      height: 68%;
      z-index: 5;
      background: #00CC00;
      border-radius: 8px;
    }

    /* Warm golden sunshine tint over the screen */
    .sunshine-tint {
      position: absolute;
      top: 12%;
      left: 18%;
      width: 64%;
      height: 68%;
      z-index: 6;
      border-radius: 8px;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 40% 30%, rgba(255, 180, 40, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 60%, rgba(255, 220, 100, 0.10) 0%, transparent 40%);
    }

    /* ── Screen bloom (light spilling into room - webcam effect) ── */
    .screen-bloom {
      position: absolute;
      top: 8%;
      left: 12%;
      width: 76%;
      height: 76%;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(
        ellipse at 50% 50%,
        rgba(255, 180, 60, 0.06) 30%,
        rgba(255, 140, 20, 0.03) 55%,
        transparent 75%
      );
    }

    /* ── Scan Lines ── */
    .scanlines {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 1px,
        rgba(0, 0, 0, 0.10) 1px,
        rgba(0, 0, 0, 0.10) 2px
      );
      mix-blend-mode: multiply;
    }

    /* ── Rolling Scan Bar ── */
    .scan-bar {
      position: absolute;
      left: 18%;
      width: 64%;
      height: 10%;
      z-index: 25;
      pointer-events: none;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(100, 200, 255, 0.03) 30%,
        rgba(100, 200, 255, 0.06) 50%,
        rgba(100, 200, 255, 0.03) 70%,
        transparent 100%
      );
    }

    /* ── VHS Noise ── */
    .vhs-noise {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ── VHS Glitch Bar ── */
    .vhs-glitch {
      position: absolute;
      left: 18%;
      width: 64%;
      height: 4px;
      z-index: 35;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.12);
      opacity: 0;
    }

    /* ── CRT Vignette ── */
    .crt-vignette {
      position: absolute;
      inset: 0;
      z-index: 40;
      pointer-events: none;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent 55%,
        rgba(0, 0, 0, 0.25) 80%,
        rgba(0, 0, 0, 0.55) 100%
      );
    }

    /* ── Phosphor Glow ── */
    .phosphor-glow {
      position: absolute;
      top: 12%;
      left: 18%;
      width: 64%;
      height: 68%;
      z-index: 22;
      pointer-events: none;
      border-radius: 8px;
      box-shadow:
        inset 0 0 40px rgba(100, 255, 100, 0.02),
        inset 0 0 80px rgba(100, 255, 100, 0.01);
    }

    /* ── Static Flash ── */
    .static-flash {
      position: absolute;
      inset: 0;
      z-index: 45;
      pointer-events: none;
      background: white;
      opacity: 0;
    }

    /* ── Webcam OSD (timestamp overlay like a security cam) ── */
    .webcam-osd {
      position: absolute;
      bottom: 24%;
      right: 22%;
      z-index: 60;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: rgba(200, 200, 200, 0.55);
      text-shadow: 0 0 4px rgba(0,0,0,0.7);
      letter-spacing: 2px;
    }

    /* ── Channel Badge ── */
    .channel-badge {
      position: absolute;
      top: 16%;
      right: 22%;
      z-index: 50;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(0, 200, 255, 0.4), 2px 2px 4px rgba(0,0,0,0.8);
      letter-spacing: 3px;
    }

    /* ── REC Indicator ── */
    .rec-indicator {
      position: absolute;
      top: 16%;
      left: 22%;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      color: rgba(255, 60, 60, 0.85);
      font-weight: 700;
      text-shadow: 0 0 12px rgba(255, 0, 0, 0.5);
    }

    .rec-dot {
      width: 12px;
      height: 12px;
      background: #ff3333;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
    }

    /* ── Chat Ticker ── */
    .chat-ticker {
      position: absolute;
      bottom: 15%;
      left: 20%;
      width: 60%;
      z-index: 55;
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: rgba(200, 255, 200, 0.6);
      text-shadow: 0 0 8px rgba(0, 255, 100, 0.25);
      overflow: hidden;
      white-space: nowrap;
    }

    .chat-ticker-text {
      display: inline-block;
    }

    /* ── Lower Third ── */
    .lower-third {
      position: absolute;
      bottom: 8%;
      left: 22%;
      z-index: 60;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 28px;
      color: #ffb830;
      text-shadow:
        0 0 20px rgba(255, 180, 40, 0.6),
        0 0 40px rgba(255, 140, 20, 0.3),
        3px 3px 6px rgba(0, 0, 0, 0.8);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .lower-third-sub {
      position: absolute;
      bottom: 5.5%;
      left: 22%;
      z-index: 60;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      color: rgba(255, 200, 100, 0.7);
      text-shadow: 0 0 8px rgba(255, 150, 30, 0.3);
      letter-spacing: 2px;
    }

    /* ── Audio Visualizer ── */
    .audio-viz {
      position: absolute;
      bottom: 16%;
      left: 21%;
      z-index: 55;
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 24px;
    }

    .viz-bar {
      width: 4px;
      background: rgba(255, 180, 40, 0.5);
      border-radius: 2px;
      box-shadow: 0 0 6px rgba(255, 180, 40, 0.3);
    }

    /* ── Neon Border Glow ── */
    .neon-border {
      position: absolute;
      top: 11.5%;
      left: 17.5%;
      width: 65%;
      height: 69%;
      z-index: 3;
      pointer-events: none;
      border: 2px solid transparent;
      border-radius: 10px;
      box-shadow:
        0 0 15px rgba(0, 255, 255, 0.12),
        inset 0 0 15px rgba(0, 255, 255, 0.08);
    }

    /* ── Dust Particles ── */
    .dust-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ── HUD Corners ── */
    .hud-corner {
      position: absolute;
      z-index: 65;
      pointer-events: none;
      width: 40px;
      height: 40px;
      border-color: rgba(0, 255, 255, 0.25);
      border-style: solid;
    }

    .hud-corner.tl { top: 11%; left: 17%; border-width: 2px 0 0 2px; }
    .hud-corner.tr { top: 11%; right: 17%; border-width: 2px 2px 0 0; }
    .hud-corner.bl { bottom: 12%; left: 17%; border-width: 0 0 2px 2px; }
    .hud-corner.br { bottom: 12%; right: 17%; border-width: 0 2px 2px 0; }

    /* ── Status Bar ── */
    .status-bar {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 70;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: rgba(0, 255, 255, 0.35);
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    /* ── Webcam Handheld Shake Container ── */
    .cam-shake {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* ── Lens dirt / webcam smudge ── */
    .lens-smudge {
      position: absolute;
      inset: 0;
      z-index: 41;
      pointer-events: none;
      opacity: 0.03;
      background: radial-gradient(
        ellipse at 30% 40%,
        rgba(180, 160, 140, 0.5) 0%,
        transparent 25%
      );
    }

    /* ── Webcam grain ── */
    .webcam-grain {
      position: absolute;
      inset: 0;
      z-index: 42;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="sunshine-render"
    data-start="0"
    data-duration="92"
    data-width="1920"
    data-height="1080"
  >
    <div class="composition" id="scene">
      <!-- Cam shake wrapper for handheld webcam feel -->
      <div class="cam-shake" id="camShake">
        <!-- Background -->
        <div class="room-bg"></div>
        <div class="neon-ambient clip" data-start="0" data-duration="92" data-track-index="0"></div>
        <div class="dust-layer" id="dustLayer"></div>

        <!-- Screen bloom (light from TV spilling into room) -->
        <div class="screen-bloom clip" data-start="0" data-duration="92" data-track-index="1"></div>

        <!-- Neon border glow -->
        <div class="neon-border clip" data-start="0" data-duration="92" data-track-index="2"></div>

        <!-- Green screen area -->
        <div class="greenscreen clip" data-start="0" data-duration="92" data-track-index="3"></div>

        <!-- Warm sunshine tint -->
        <div class="sunshine-tint clip" data-start="0" data-duration="92" data-track-index="4"></div>

        <!-- TV Frame -->
        <div class="tv-frame clip" data-start="0" data-duration="92" data-track-index="10"></div>

        <!-- CRT Effects -->
        <div class="scanlines clip" data-start="0" data-duration="92" data-track-index="15"></div>
        <div class="scan-bar clip" data-start="0" data-duration="92" data-track-index="16" id="scanBar"></div>
        <div class="vhs-noise clip" data-start="0" data-duration="92" data-track-index="17"></div>
        <div class="vhs-glitch clip" data-start="0" data-duration="92" data-track-index="18" id="vhsGlitch"></div>
        <div class="crt-vignette clip" data-start="0" data-duration="92" data-track-index="19"></div>
        <div class="phosphor-glow clip" data-start="0" data-duration="92" data-track-index="20"></div>
        <div class="static-flash clip" data-start="0" data-duration="92" data-track-index="21" id="staticFlash"></div>

        <!-- Webcam-style effects -->
        <div class="lens-smudge clip" data-start="0" data-duration="92" data-track-index="22"></div>
        <div class="webcam-grain clip" data-start="0" data-duration="92" data-track-index="23"></div>

        <!-- HUD Corners -->
        <div class="hud-corner tl clip" id="hudTL" data-start="0" data-duration="92" data-track-index="24"></div>
        <div class="hud-corner tr clip" id="hudTR" data-start="0" data-duration="92" data-track-index="25"></div>
        <div class="hud-corner bl clip" id="hudBL" data-start="0" data-duration="92" data-track-index="26"></div>
        <div class="hud-corner br clip" id="hudBR" data-start="0" data-duration="92" data-track-index="27"></div>

        <!-- Overlays -->
        <div class="channel-badge clip" data-start="0" data-duration="92" data-track-index="28" id="channelBadge">CH 04</div>
        <div class="rec-indicator clip" data-start="0" data-duration="92" data-track-index="29" id="recIndicator">
          <div class="rec-dot" id="recDot"></div>
          REC
        </div>

        <!-- Webcam OSD timestamp -->
        <div class="webcam-osd clip" data-start="0" data-duration="92" data-track-index="30" id="webcamOsd">
          REC 03:47 AM
        </div>

        <!-- Status bar -->
        <div class="status-bar clip" data-start="0.5" data-duration="91" data-track-index="31" id="statusBar">
          ◈ MINDEXPANDER NETWORK ◈ LATE NIGHT STREAM ◈
        </div>

        <!-- Chat ticker -->
        <div class="chat-ticker clip" data-start="1" data-duration="91" data-track-index="32" id="chatTicker">
          <span class="chat-ticker-text" id="chatText">
            yo this cartoon is wild   whats this from?   lol the milk propaganda   i cant sleep   🔥🔥   put sunshine makers on   this is cursed   vintage weirdness   late night vibes   i love this   🌅
          </span>
        </div>

        <!-- Audio visualizer -->
        <div class="audio-viz clip" data-start="0" data-duration="92" data-track-index="33" id="audioViz"></div>

        <!-- Lower third - Sunshine Makers -->
        <div class="lower-third clip" data-start="1.5" data-duration="90" data-track-index="34" id="lowerThird">
          THE SUNSHINE MAKERS
        </div>
        <div class="lower-third-sub clip" data-start="2" data-duration="89.5" data-track-index="35" id="lowerThirdSub">
          1935 • Borden Milk propaganda
        </div>
      </div><!-- end cam-shake -->
    </div>
  </div>

  <!-- Audio element (separate per HyperFrames rules) -->
  <audio
    id="rambleAudio"
    src="assets/ramble.wav"
    data-start="0"
    data-duration="92"
    data-track-index="99"
  ></audio>

  <script>
    // ── Seeded PRNG (mulberry32) for deterministic renders ──
    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        var t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    const rng = mulberry32(77);

    // ── Generate dust particles ──
    const dustLayer = document.getElementById('dustLayer');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.style.cssText = [
        'position: absolute',
        `width: ${1 + rng() * 2}px`,
        `height: ${1 + rng() * 2}px`,
        `background: rgba(200, 180, 140, ${0.12 + rng() * 0.12})`,
        'border-radius: 50%',
        `left: ${rng() * 100}%`,
        `top: ${rng() * 100}%`
      ].join(';');
      p.className = 'dust-particle';
      p.setAttribute('data-dust-idx', i);
      dustLayer.appendChild(p);
    }

    // ── Generate audio viz bars ──
    const audioViz = document.getElementById('audioViz');
    for (let i = 0; i < 14; i++) {
      const bar = document.createElement('div');
      bar.className = 'viz-bar';
      bar.style.height = '4px';
      audioViz.appendChild(bar);
    }

    // ── GSAP Timeline ──
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    const DUR = 92;
    const rng2 = mulberry32(123);

    // === Entrance ===
    // Room fades in
    tl.from('.room-bg', { opacity: 0, duration: 2.5 }, 0);
    tl.from('.neon-ambient', { opacity: 0, duration: 3 }, 0);

    // TV frame glitches in
    tl.from('.tv-frame', {
      opacity: 0,
      scale: 1.05,
      filter: 'brightness(2) contrast(0.5)',
      duration: 1.5,
      ease: 'power3.out'
    }, 0.5);

    // Green screen fades in
    tl.from('.greenscreen', {
      opacity: 0,
      duration: 1,
      ease: 'power2.inOut'
    }, 0.8);

    // Sunshine tint warms up
    tl.from('.sunshine-tint', {
      opacity: 0,
      duration: 2.5,
      ease: 'power2.inOut'
    }, 1);

    // Screen bloom comes in
    tl.from('.screen-bloom', {
      opacity: 0,
      duration: 3,
      ease: 'power2.out'
    }, 0.5);

    // Neon border appears
    tl.from('.neon-border', {
      opacity: 0,
      scale: 0.98,
      duration: 2,
      ease: 'power2.out'
    }, 1);

    // HUD corners
    tl.from('.hud-corner', {
      opacity: 0,
      scale: 0,
      duration: 0.5,
      stagger: 0.1,
      ease: 'back.out(2)'
    }, 1.5);

    // Channel badge
    tl.from('#channelBadge', {
      opacity: 0,
      x: 20,
      duration: 0.8,
      ease: 'power2.out'
    }, 2);

    // REC indicator
    tl.from('#recIndicator', {
      opacity: 0,
      x: -20,
      duration: 0.8,
      ease: 'power2.out'
    }, 2);

    // Webcam OSD
    tl.from('#webcamOsd', {
      opacity: 0,
      duration: 1,
      ease: 'power2.out'
    }, 2.5);

    // Status bar
    tl.from('#statusBar', {
      opacity: 0,
      y: -10,
      duration: 1,
      ease: 'power2.out'
    }, 2.5);

    // Lower third
    tl.from('#lowerThird', {
      opacity: 0,
      y: 30,
      duration: 1,
      ease: 'power3.out'
    }, 3);

    tl.from('#lowerThirdSub', {
      opacity: 0,
      y: 20,
      duration: 0.8,
      ease: 'power3.out'
    }, 3.3);

    // Chat ticker
    tl.from('#chatTicker', {
      opacity: 0,
      y: 10,
      duration: 1,
      ease: 'power2.out'
    }, 3.5);

    // === Scan bar (continuous) ===
    const scanDuration = 8;
    const scanRepeats = Math.floor(DUR / scanDuration);
    tl.fromTo('#scanBar', {
      top: '-12%'
    }, {
      top: '100%',
      duration: scanDuration,
      ease: 'none',
      repeat: scanRepeats - 1
    }, 0);

    // === VHS glitch flashes (scattered through duration) ===
    const glitchTimes = [];
    for (let t = 4; t < DUR - 2; t += 5 + Math.floor(rng2() * 4)) {
      glitchTimes.push(t);
    }
    glitchTimes.forEach(time => {
      if (time >= DUR) return;
      tl.set('#vhsGlitch', {
        opacity: 1,
        top: (15 + rng2() * 50) + '%',
        skewX: (rng2() * 10 - 5) + 'deg'
      }, time);
      tl.set('#vhsGlitch', { opacity: 0 }, time + 0.15);
    });

    // === Static flashes ===
    for (let t = 10; t < DUR - 1; t += 12 + Math.floor(rng2() * 6)) {
      if (t >= DUR) break;
      tl.set('#staticFlash', { opacity: 0.05 + rng2() * 0.03 }, t);
      tl.set('#staticFlash', { opacity: 0 }, t + 0.08);
    }

    // === Dust particles float ===
    document.querySelectorAll('.dust-particle').forEach((p, i) => {
      tl.to(p, {
        y: -(40 + rng2() * 40),
        x: (rng2() * 30 - 15),
        opacity: 0,
        duration: 8 + (i % 5) * 3,
        ease: 'none',
        repeat: Math.floor(DUR / (8 + (i % 5) * 3)) - 1
      }, i * 0.3);
    });

    // === REC dot blink ===
    tl.to('#recDot', {
      opacity: 0,
      duration: 0.5,
      repeat: Math.floor(DUR / 1) - 1,
      yoyo: true,
      ease: 'power1.inOut'
    }, 0);

    // === Audio viz bars pulse ===
    document.querySelectorAll('.viz-bar').forEach((bar, i) => {
      tl.to(bar, {
        height: (8 + rng2() * 16) + 'px',
        duration: 0.3 + (i % 4) * 0.12,
        repeat: Math.floor(DUR / 0.5) - 1,
        yoyo: true,
        ease: 'power1.inOut'
      }, i * 0.04);
    });

    // === Channel badge subtle pulse ===
    tl.to('#channelBadge', {
      opacity: 0.25,
      duration: 2,
      repeat: Math.floor(DUR / 4) - 1,
      yoyo: true,
      ease: 'sine.inOut'
    }, 2);

    // === Chat ticker scroll ===
    tl.to('#chatText', {
      x: -900,
      duration: 25,
      ease: 'none',
      repeat: Math.floor(DUR / 25) - 1
    }, 3);

    // === Webcam OSD flicker ===
    tl.to('#webcamOsd', {
      opacity: 0.35,
      duration: 0.8,
      repeat: Math.floor(DUR / 1.6) - 1,
      yoyo: true,
      ease: 'power1.inOut'
    }, 0);

    // === Sunshine tint warmth pulsing ===
    tl.to('.sunshine-tint', {
      opacity: 0.7,
      duration: 6,
      repeat: Math.floor(DUR / 12) - 1,
      yoyo: true,
      ease: 'sine.inOut'
    }, 2);

    // === Screen bloom breathing ===
    tl.to('.screen-bloom', {
      opacity: 0.7,
      duration: 5,
      repeat: Math.floor(DUR / 10) - 1,
      yoyo: true,
      ease: 'sine.inOut'
    }, 1);

    // === Handheld camera shake (subtle webcam wobble) ===
    tl.to('#camShake', {
      x: 3,
      y: -2,
      rotation: 0.15,
      duration: 4,
      ease: 'sine.inOut',
      repeat: Math.floor(DUR / 8) - 1,
      yoyo: true
    }, 0);
    tl.to('#camShake', {
      x: -2,
      y: 1,
      rotation: -0.1,
      duration: 5,
      ease: 'sine.inOut',
      repeat: Math.floor(DUR / 10) - 1,
      yoyo: true
    }, 0.5);

    // === Neon border pulse ===
    tl.to('.neon-border', {
      boxShadow: '0 0 25px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.12)',
      duration: 4,
      repeat: Math.floor(DUR / 8) - 1,
      yoyo: true,
      ease: 'sine.inOut'
    }, 0);

    // Register the timeline
    window.__timelines['sunshine-render'] = tl;

    console.log('🌅 Sunshine Makers render composition loaded. Duration:', DUR, 'seconds.');
  </script>
</body>
</html>

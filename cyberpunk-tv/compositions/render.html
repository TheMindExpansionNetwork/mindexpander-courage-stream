<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px; overflow: hidden;
      background: #000;
      font-family: 'Share Tech Mono', monospace;
    }
    .scene { position: relative; width: 1920px; height: 1080px; overflow: hidden; }

    /* Room background */
    .room-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(20, 5, 40, 0.9) 0%, rgba(5, 2, 15, 1) 70%),
        linear-gradient(180deg, #0a0015 0%, #050010 50%, #020008 100%);
    }

    /* Neon ambient */
    .neon-ambient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(0, 255, 255, 0.05) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 0, 128, 0.04) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 100%, rgba(120, 0, 255, 0.06) 0%, transparent 30%);
    }

    /* TV frame */
    .tv-frame {
      position: absolute; inset: 0;
      background: url('assets/cyberpunk-tv-frame.png') center/cover no-repeat;
      z-index: 10;
    }

    /* Green screen */
    .greenscreen {
      position: absolute;
      top: 12%; left: 18%; width: 64%; height: 68%;
      background: #00FF00; border-radius: 8px; z-index: 5;
    }

    /* CRT effects */
    .scanlines {
      position: absolute; inset: 0; z-index: 20; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.08) 1px, rgba(0,0,0,0.08) 2px);
    }
    .scan-bar {
      position: absolute; left: 18%; width: 64%; height: 12%; z-index: 25; pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(100,200,255,0.04), rgba(100,200,255,0.08), rgba(100,200,255,0.04), transparent);
    }
    .vhs-glitch {
      position: absolute; left: 18%; width: 64%; height: 3px; z-index: 30; pointer-events: none;
      background: rgba(255,255,255,0.15); opacity: 0;
    }
    .vignette {
      position: absolute; inset: 0; z-index: 35; pointer-events: none;
      box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
    }

    /* HUD */
    .channel-badge {
      position: absolute; top: 16%; right: 22%; z-index: 50;
      font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700;
      color: rgba(255,200,50,0.6);
      text-shadow: 0 0 10px rgba(255,200,50,0.3), 2px 2px 4px rgba(0,0,0,0.8);
      letter-spacing: 3px;
    }
    .rec-indicator {
      position: absolute; top: 16%; left: 22%; z-index: 50;
      display: flex; align-items: center; gap: 8px;
      font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700;
      color: rgba(255,60,60,0.9);
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
    }
    .rec-dot {
      width: 10px; height: 10px; background: #ff3333; border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,0,0,0.6);
    }
    .lower-third {
      position: absolute; bottom: 12%; left: 22%; z-index: 50;
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 24px;
      color: #ffd700;
      text-shadow: 0 0 15px rgba(255,215,0,0.5), 2px 2px 4px rgba(0,0,0,0.8);
      letter-spacing: 3px;
    }
    .lower-third-sub {
      position: absolute; bottom: 9%; left: 22%; z-index: 50;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      color: rgba(255,150,50,0.7);
      text-shadow: 0 0 8px rgba(255,150,50,0.3);
      letter-spacing: 2px;
    }
    .chat-ticker {
      position: absolute; bottom: 18%; left: 20%; width: 60%; z-index: 50;
      font-size: 15px; color: rgba(255,220,100,0.7);
      text-shadow: 0 0 8px rgba(255,200,50,0.3), 1px 1px 3px rgba(0,0,0,0.9);
      overflow: hidden; white-space: nowrap;
    }
    .status-bar {
      position: absolute; top: 6%; left: 50%; transform: translateX(-50%);
      z-index: 50; font-size: 12px; color: rgba(0,255,255,0.35);
      letter-spacing: 5px; text-transform: uppercase;
    }
    .phosphor-glow {
      position: absolute; top: 12%; left: 18%; width: 64%; height: 68%;
      z-index: 22; pointer-events: none; border-radius: 8px;
      box-shadow: inset 0 0 40px rgba(255,200,50,0.03), inset 0 0 80px rgba(255,200,50,0.02);
    }
    .sunshine-tint {
      position: absolute; top: 12%; left: 18%; width: 64%; height: 68%;
      z-index: 6; pointer-events: none; border-radius: 8px;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,200,50,0.04) 0%, transparent 70%);
    }
  </style>
</head>
<body>
  <div id="root" data-composition-id="sunshine-render" data-start="0" data-duration="92" data-width="1920" data-height="1080">
    <div class="scene" id="scene">
      <!-- Background -->
      <div class="room-bg clip" data-start="0" data-duration="92" data-track-index="0"></div>
      <div class="neon-ambient clip" data-start="0" data-duration="92" data-track-index="1"></div>

      <!-- Green screen + sunshine tint -->
      <div class="greenscreen clip" data-start="0" data-duration="92" data-track-index="5"></div>
      <div class="sunshine-tint clip" data-start="0" data-duration="92" data-track-index="6"></div>

      <!-- TV Frame -->
      <div class="tv-frame clip" data-start="0" data-duration="92" data-track-index="10"></div>

      <!-- CRT Effects -->
      <div class="scanlines clip" data-start="0" data-duration="92" data-track-index="15"></div>
      <div class="scan-bar clip" data-start="0" data-duration="92" data-track-index="16" id="scanBar"></div>
      <div class="vhs-glitch clip" data-start="0" data-duration="92" data-track-index="17" id="vhsGlitch"></div>
      <div class="vignette clip" data-start="0" data-duration="92" data-track-index="18"></div>
      <div class="phosphor-glow clip" data-start="0" data-duration="92" data-track-index="19"></div>

      <!-- HUD -->
      <div class="channel-badge clip" data-start="0" data-duration="92" data-track-index="20" id="channelBadge">CH 03 ☀️</div>
      <div class="rec-indicator clip" data-start="0" data-duration="92" data-track-index="20" id="recIndicator">
        <div class="rec-dot" id="recDot"></div>REC
      </div>
      <div class="status-bar clip" data-start="1" data-duration="91" data-track-index="21">◈ MINDEXPANDER NETWORK ◈ SUNSHINE TV ◈</div>
      <div class="chat-ticker clip" data-start="1" data-duration="91" data-track-index="22" id="chatTicker">
        <span id="chatText">Welcome to the stream... Today we're watching The Sunshine Makers (1935) — gnomes defeating sadness with weaponized milk...</span>
      </div>
      <div class="lower-third clip" data-start="2" data-duration="90" data-track-index="25" id="lowerThird">THE SUNSHINE MAKERS</div>
      <div class="lower-third-sub clip" data-start="2.5" data-duration="89.5" data-track-index="25" id="lowerThirdSub">1935 • Borden Milk propaganda • weaponized dairy</div>

      <!-- Audio -->
      <audio id="rambleAudio" src="assets/ramble.wav" preload="auto"></audio>
    </div>
  </div>

  <script>
    // Seeded PRNG
    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        var t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    const rng = mulberry32(42);

    // Chat ticker scroll
    const chatText = document.getElementById('chatText');
    let chatPos = 1920;
    function scrollChat() {
      chatPos -= 0.8;
      if (chatPos < -chatText.scrollWidth) chatPos = 1920;
      chatText.style.transform = `translateX(${chatPos}px)`;
      requestAnimationFrame(scrollChat);
    }
    scrollChat();

    // GSAP Timeline
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // Entrance
    tl.from('.room-bg', { opacity: 0, duration: 2 }, 0);
    tl.from('.tv-frame', { opacity: 0, scale: 1.02, duration: 1.5, ease: 'power3.out' }, 0.5);
    tl.from('.greenscreen', { opacity: 0, duration: 1 }, 0.8);
    tl.from('#channelBadge', { opacity: 0, x: 20, duration: 0.8 }, 2);
    tl.from('#recIndicator', { opacity: 0, x: -20, duration: 0.8 }, 2);
    tl.from('#lowerThird', { opacity: 0, y: 30, duration: 1 }, 3);
    tl.from('#lowerThirdSub', { opacity: 0, y: 20, duration: 0.8 }, 3.3);
    tl.from('#chatTicker', { opacity: 0, y: 10, duration: 1 }, 3.5);

    // Scan bar
    tl.fromTo('#scanBar', { top: '-12%' }, { top: '100%', duration: 8, ease: 'none', repeat: 10 }, 0);

    // VHS glitch
    [5, 12, 20, 28, 35, 42, 50, 58, 65, 72, 80, 88].forEach(t => {
      tl.set('#vhsGlitch', { opacity: 1, top: (15 + rng() * 50) + '%', skewX: (rng() * 6 - 3) + 'deg' }, t);
      tl.set('#vhsGlitch', { opacity: 0 }, t + 0.15);
    });

    // REC dot blink
    tl.to('#recDot', { opacity: 0, duration: 0.5, repeat: 45, yoyo: true, ease: 'power1.inOut' }, 0);

    // Channel badge pulse
    tl.to('#channelBadge', { opacity: 0.3, duration: 2, repeat: 20, yoyo: true, ease: 'sine.inOut' }, 2);

    // Register
    window.__timelines['sunshine-render'] = tl;
  </script>
</body>
</html>

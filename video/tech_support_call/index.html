<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tech Support Call</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { margin: 0; background: #000; }
  
  #stage {
    position: relative;
    overflow: hidden;
    background: #06060d;
    font-family: "Courier New", monospace;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    pointer-events: none;
    z-index: 100;
  }

  .grid {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 1;
  }

  .call-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: rgba(17,17,34,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    padding: 0 36px;
    gap: 18px;
    z-index: 50;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
  }
  .call-label {
    font-size: 16px;
    color: #555577;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .timer {
    font-size: 22px;
    color: #e0e0f0;
    margin-left: auto;
    letter-spacing: 3px;
    font-weight: bold;
  }

  .avatar-caller {
    position: absolute;
    top: 96px;
    left: 56px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .avatar-agent {
    position: absolute;
    bottom: 190px;
    right: 56px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .avatar-circle {
    width: 88px; height: 88px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .caller-circle {
    background: linear-gradient(135deg, #ff2d75, #ff6b9d);
    box-shadow: 0 0 32px rgba(255,45,117,0.25);
  }
  .agent-circle {
    background: linear-gradient(135deg, #0088cc, #00d4ff);
    box-shadow: 0 0 32px rgba(0,136,204,0.25);
  }
  .avatar-label {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .caller-label { color: #ff6b9d; }
  .agent-label { color: #00d4ff; }

  .bubble-caller, .bubble-agent {
    position: absolute;
    max-width: 500px;
    padding: 18px 24px;
    border-radius: 16px;
    font-size: 22px;
    line-height: 1.4;
    color: #e0e0f0;
    opacity: 0;
    z-index: 9;
  }
  .bubble-caller {
    top: 110px; left: 175px;
    background: rgba(255,45,117,0.07);
    border: 1px solid rgba(255,107,157,0.2);
  }
  .bubble-agent {
    bottom: 200px; right: 175px;
    text-align: right;
    background: rgba(0,136,204,0.07);
    border: 1px solid rgba(0,212,255,0.2);
  }

  .caption-container {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 1500px;
    gap: 0;
  }
  .caption-word {
    font-size: 32px;
    font-weight: bold;
    margin: 0 5px;
    opacity: 0.15;
    letter-spacing: 1px;
    color: #ffffff;
  }
  .caption-word.caller-word { color: #ff6b9d; text-shadow: 0 0 10px rgba(255,107,157,0.5); }
  .caption-word.agent-word { color: #00d4ff; text-shadow: 0 0 10px rgba(0,212,255,0.5); }
  .caption-word.active { opacity: 1; }

  .hold-indicator {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    color: #ff6b9d;
    letter-spacing: 10px;
    text-transform: uppercase;
    opacity: 0;
    z-index: 50;
  }
</style>
